<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillForge Academy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
      scroll-behavior:smooth;
    }

    body{
      background:#f5f7ff;
      color:#222;
      overflow-x:hidden;
    }

    /* HEADER */

    header{
      width:100%;
      padding:18px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      top:0;
      z-index:1000;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(10px);
    }

    .logo{
      font-size:30px;
      font-weight:700;
      color:#fff;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      font-weight:500;
      transition:0.3s;
    }

    nav a:hover{
      color:#ffd166;
    }

    /* HERO SECTION */

    .hero{
      min-height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
      url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
      color:white;
    }

    .hero-content h1{
      font-size:70px;
      margin-bottom:20px;
      line-height:1.2;
    }

    .hero-content span{
      color:#ffd166;
    }

    .hero-content p{
      max-width:800px;
      margin:auto;
      font-size:22px;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      background:linear-gradient(135deg,#ff6b6b,#ffb703);
      border-radius:50px;
      color:white;
      text-decoration:none;
      font-weight:600;
      transition:0.4s;
      box-shadow:0 8px 25px rgba(255,107,107,0.4);
    }

    .btn:hover{
      transform:translateY(-5px) scale(1.03);
    }

    /* SECTION */

    section{
      padding:100px 8%;
    }

    .section-title{
      text-align:center;
      margin-bottom:60px;
    }

    .section-title h2{
      font-size:45px;
      margin-bottom:10px;
      color:#6c63ff;
    }

    .section-title p{
      color:#666;
      font-size:18px;
    }

    /* ABOUT */

    .about{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:40px;
      align-items:center;
    }

    .about img{
      width:100%;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
    }

    .about-content h3{
      font-size:35px;
      margin-bottom:20px;
      color:#ff6b6b;
    }

    .about-content p{
      font-size:18px;
      line-height:1.8;
      color:#444;
    }

    /* SERVICES */

    .services{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
    }

    .service-box{
      padding:35px;
      border-radius:25px;
      color:white;
      transition:0.4s;
    }

    .service-box:nth-child(1){
      background:linear-gradient(135deg,#6c63ff,#5f27cd);
    }

    .service-box:nth-child(2){
      background:linear-gradient(135deg,#ff6b6b,#ee5253);
    }

    .service-box:nth-child(3){
      background:linear-gradient(135deg,#00c9a7,#00b894);
    }

    .service-box:nth-child(4){
      background:linear-gradient(135deg,#ff9f43,#ff6b6b);
    }

    .service-box:nth-child(5){
      background:linear-gradient(135deg,#48dbfb,#0abde3);
    }

    .service-box:nth-child(6){
      background:linear-gradient(135deg,#f368e0,#c44569);
    }

    .service-box:hover{
      transform:translateY(-10px);
    }

    .service-box h3{
      font-size:26px;
      margin-bottom:15px;
    }

    /* STATS */

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:25px;
    }

    .stat-box{
      background:white;
      padding:40px;
      text-align:center;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    .stat-box h2{
      font-size:45px;
      color:#6c63ff;
    }

    /* TESTIMONIALS */

    .testimonial-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
    }

    .testimonial{
      background:white;
      padding:30px;
      border-radius:25px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      border-top:5px solid #ff6b6b;
    }

    .testimonial p{
      margin-bottom:15px;
      color:#555;
    }

    .testimonial h4{
      color:#6c63ff;
    }

    /* CONTACT */

    .contact{
      background:linear-gradient(135deg,#6c63ff,#ff6b6b);
      color:white;
      border-radius:30px;
      padding:70px;
    }

    .contact form{
      max-width:700px;
      margin:auto;
    }

    .contact input,
    .contact textarea{
      width:100%;
      padding:18px;
      margin:12px 0;
      border:none;
      border-radius:12px;
      font-size:16px;
    }

    .contact button{
      border:none;
      cursor:pointer;
    }

    /* FOOTER */

    footer{
      background:#111827;
      color:white;
      text-align:center;
      padding:25px;
      margin-top:60px;
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      header{
        flex-direction:column;
      }

      nav{
        margin-top:15px;
      }

      .hero-content h1{
        font-size:45px;
      }

      .hero-content p{
        font-size:18px;
      }

      .contact{
        padding:35px;
      }
    }

  </style>
</head>

<body>

  <!-- HEADER -->

  <header>

    <div class="logo">SkillForge</div>

    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#stats">Achievements</a>
      <a href="#testimonials">Testimonials</a>
      <a href="#contact">Contact</a>
    </nav>

  </header>

  <!-- HERO -->

  <section class="hero" id="home">

    <div class="hero-content">

      <h1>Learn <span>Future Skills</
